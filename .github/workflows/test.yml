name: Full Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry install --with dev

      - name: Lint (ruff)
        working-directory: backend
        run: poetry run ruff check src/

      - name: Type check (mypy)
        working-directory: backend
        run: poetry run mypy src/code4u/ --ignore-missing-imports || true

      - name: Unit Tests
        working-directory: backend
        run: poetry run pytest tests/test_comprehensive_unit.py -v --tb=short

      - name: Integration Tests
        working-directory: backend
        run: poetry run pytest tests/test_comprehensive_integration.py -v --tb=short

      - name: Smoke & Sanity Tests
        working-directory: backend
        run: poetry run pytest tests/test_smoke_sanity.py -v --tb=short

      - name: Regression Tests
        working-directory: backend
        run: poetry run pytest tests/test_regression_suite.py -v --tb=short

      - name: Security Audit Tests
        working-directory: backend
        run: poetry run pytest tests/test_security_audit.py -v --tb=short

      - name: E2E System Tests
        working-directory: backend
        run: poetry run pytest tests/test_e2e_system.py -v --tb=short

      - name: Performance / Non-Functional Tests
        working-directory: backend
        run: poetry run pytest tests/test_performance_nonfunctional.py -v --tb=short

      - name: Full Suite with Coverage
        working-directory: backend
        run: |
          poetry run pytest tests/ -v --tb=short --cov=src/code4u --cov-report=term-missing --cov-report=html
          echo "### Backend Coverage Report" >> $GITHUB_STEP_SUMMARY
          poetry run pytest tests/ --cov=src/code4u --cov-report=term 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-py${{ matrix.python-version }}
          path: backend/htmlcov/

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: frontends/workspace
        run: npm ci

      - name: TypeScript compile check
        working-directory: frontends/workspace
        run: npx tsc --noEmit --skipLibCheck

      - name: Unit Tests
        working-directory: frontends/workspace
        run: npx vitest run src/test/unit/ --reporter=verbose

      - name: Integration Tests
        working-directory: frontends/workspace
        run: npx vitest run src/test/integration/ --reporter=verbose

      - name: Accessibility Tests
        working-directory: frontends/workspace
        run: npx vitest run src/test/accessibility/ --reporter=verbose

      - name: Smoke Tests
        working-directory: frontends/workspace
        run: npx vitest run src/test/smoke/ --reporter=verbose

      - name: Regression Tests
        working-directory: frontends/workspace
        run: npx vitest run src/test/regression/ --reporter=verbose

      - name: Compatibility Tests
        working-directory: frontends/workspace
        run: npx vitest run src/test/compatibility/ --reporter=verbose

      - name: Full Suite with Coverage
        working-directory: frontends/workspace
        run: |
          npx vitest run --coverage --reporter=verbose
          echo "### Frontend Coverage Report" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-node${{ matrix.node-version }}
          path: frontends/workspace/coverage/

  compatibility-matrix:
    name: Browser Compatibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        working-directory: frontends/workspace
        run: |
          npm ci
          npx vite build
      - name: Verify Build Output
        working-directory: frontends/workspace
        run: |
          test -d dist
          test -f dist/index.html
          echo "Build successful — production bundle generated"
          ls -la dist/
          du -sh dist/
