[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "code4u-backend"
version = "1.0.0"
description = "code4u.ai Backend Services - AI-Native Engineering Platform"
authors = ["code4u.ai Team"]
packages = [{ include = "code4u", from = "src" }]

[tool.poetry.dependencies]
python = "^3.9"
# Core web framework
fastapi = "^0.109.0"
uvicorn = { extras = ["standard"], version = "^0.27.0" }
pydantic = "^2.5.3"
pydantic-settings = "^2.1.0"
python-multipart = "^0.0.6"

# HTTP clients
httpx = "^0.26.0"

# Logging
structlog = "^24.1.0"

# CLI
typer = {extras = ["all"], version = "^0.9.0"}
rich = "^13.7.0"

# Concurrency
filelock = "^3.13.0"

# SSE streaming
sse-starlette = "^2.0.0"

# GitHub integration
PyGithub = "^2.1.0"

# File watching
watchdog = "^6.0.0"

# Authentication
passlib = {extras = ["bcrypt"], version = "^1.7.4"}
python-jose = {extras = ["cryptography"], version = "^3.3.0"}

# Utilities
PyYAML = "^6.0.1"
toml = "^0.10.2"
eval-type-backport = "^0.2.0"

