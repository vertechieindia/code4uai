# Kubernetes deployment for code4u.ai API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code4u-api
  namespace: code4u
  labels:
    app: code4u-api
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: code4u-api
  template:
    metadata:
      labels:
        app: code4u-api
        component: api
    spec:
      containers:
        - name: api
          image: code4u/api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: code4u-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: LLM_VLLM_HOST
              value: "code4u-vllm"
            - name: LLM_VLLM_PORT
              value: "8001"
            - name: LLM_EMBEDDING_ENDPOINT
              value: "http://code4u-embedding:8002"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: code4u-api
  namespace: code4u
spec:
  selector:
    app: code4u-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code4u-api-ingress
  namespace: code4u
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.code4u.ai
      secretName: code4u-tls
  rules:
    - host: api.code4u.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: code4u-api
                port:
                  number: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: code4u-api-hpa
  namespace: code4u
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: code4u-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

