apiVersion: apps/v1
kind: Deployment
metadata:
  name: code4u-api
  namespace: code4u
  labels:
    app: code4u
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: code4u
      component: api
  template:
    metadata:
      labels:
        app: code4u
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: code4u-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: code4u/api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: code4u-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: code4u-secrets
                  key: redis-url
            - name: QDRANT_URL
              valueFrom:
                configMapKeyRef:
                  name: code4u-config
                  key: qdrant-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: code4u-secrets
                  key: anthropic-api-key
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: code4u-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: code4u
                    component: api
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: code4u-api
  namespace: code4u
  labels:
    app: code4u
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: code4u
    component: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: code4u-api-hpa
  namespace: code4u
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: code4u-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: code4u-api-ingress
  namespace: code4u
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.code4u.ai
      secretName: code4u-api-tls
  rules:
    - host: api.code4u.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: code4u-api
                port:
                  number: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: code4u-config
  namespace: code4u
data:
  qdrant-url: "http://qdrant.code4u.svc.cluster.local:6333"
  log-level: "INFO"
  enable-metrics: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: code4u-api
  namespace: code4u

