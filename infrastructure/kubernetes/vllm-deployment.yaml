# Kubernetes deployment for vLLM inference server
# Production configuration for L40S / A100 GPUs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code4u-vllm
  namespace: code4u
  labels:
    app: code4u-vllm
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code4u-vllm
  template:
    metadata:
      labels:
        app: code4u-vllm
        component: inference
    spec:
      containers:
        - name: vllm
          image: code4u/vllm:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: code4u-secrets
                  key: hf-token
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1"
          resources:
            requests:
              memory: "80Gi"
              cpu: "16"
              nvidia.com/gpu: "2"
            limits:
              memory: "128Gi"
              cpu: "32"
              nvidia.com/gpu: "2"
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: lora-adapters
              mountPath: /lora-adapters
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
        - name: lora-adapters
          configMap:
            name: code4u-lora-adapters
      nodeSelector:
        gpu.nvidia.com/class: L40S  # or A100
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: code4u-vllm
  namespace: code4u
spec:
  selector:
    app: code4u-vllm
  ports:
    - port: 8001
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: code4u
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
  storageClassName: fast-ssd
---
# Horizontal Pod Autoscaler for multi-tenant batching
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: code4u-vllm-hpa
  namespace: code4u
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: code4u-vllm
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: vllm_pending_requests
        target:
          type: AverageValue
          averageValue: "50"

